<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>智慧健康日誌</title>
</head>
<body class="container mt-5">
    <h2 class="mb-4">智慧健康日誌與風險評估系統</h2>
    <div class="card p-4 shadow-sm">
        <input type="date" id="date" class="form-control mb-2">
        <input type="number" id="sleep" class="form-control mb-2" placeholder="睡眠時數 (小時)">
        <input type="number" id="steps" class="form-control mb-2" placeholder="每日步數">
        <input type="number" id="mood" class="form-control mb-2" placeholder="心情分數 (1-10)">
        <button class="btn btn-primary" onclick="submitData()">送出並評估風險</button>
    </div>
    <div id="result" class="mt-3 h4"></div>
    <hr>
    <h3>歷史紀錄</h3>
    <table class="table table-striped">
        <thead><tr><th>日期</th><th>睡眠</th><th>步數</th><th>心情</th><th>風險等級</th></tr></thead>
        <tbody id="logTable"></tbody>
    </table>
    <script src="script.js"></script>
</body>
</html>
